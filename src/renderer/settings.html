<!doctype html><html><head><meta charset="utf-8"><title>Settings</title><link rel="stylesheet" href="styles/settings.css"></head><body><main><h1>FlipClock Wallpaper</h1><label><input id="use24Hour" type="checkbox"> 24-hour time</label><label><input id="showSeconds" type="checkbox"> Show seconds</label><label><input id="showDate" type="checkbox"> Show date</label><label>Theme <select id="preset"><option value="graphite">Graphite</option><option value="ivory">Ivory</option><option value="midnight">Midnight</option></select></label><label>Scale <input id="scale" type="range" min="0.5" max="1.7" step="0.05"></label><label>Camera tilt <input id="tilt" type="range" min="0" max="1" step="0.01"></label><label>Position <select id="position"><option>center</option><option>top-left</option><option>top-right</option><option>bottom-left</option><option>bottom-right</option></select></label><button id="restart">Restart clock</button></main><script src="settings.js"></script></body></html>
